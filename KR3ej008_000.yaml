front:
  text: 序且言之無關於民生不足以傳於後世與無補於當時者雖言如弗言也是故役神敝精立言著書而無所用於天下者君子不為焉醫之為道也聖人所以前民用而傳後世者也夫豈小道云爾哉粵自黃帝三代而下賢哲吐辭為經烺炳炳其泐為成書也已彰彰矣而吾徒尚何言哉尚何言哉雖然言今之醫而吾心戚矣言今之兒醫而吾心益大戚矣何則人有所欲喻於當世者而當世先有所執持而莫能明有所欲白於斯人者而斯人亦有所膠固而不能解則予愈不得不憬然而心惻矣嗟乎嗟乎古今來因陋就簡錮蔽沉溺與夫抱憤懣而不能明就危亡而不知悟若是者豈少哉予弟子芝嶼受予意為兒科書蓋憫童稚之無辜而挽當時之陋習也其言綜前賢之奧旨發金匱之英華別徑分門瞭若觀火精純泮渙法簡而該此誠可以大補當時傳後世以衛民生者矣夫豈役神敝精而無所用於天下哉且夫人之惑溺而莫能破其懵昧者誠以成書龐雜靡所適從簡陋苟安訛傳沿習衢談巷說比比而然苟得乎婦人女子之情通乎閒闥閨闈之見則其所挾持而噪為良醫者正其惑溺於己而厚誣於人者也悲夫晚近之人師心立說妄意著書蔑古成法爭鳴新奇揆之於古人折臂折肱之義不已大謬不然乎無怪乎惑溺者而終莫之破已吾於是益不禁怦然心動矣苟以局中之見參一局外之觀則以己之赤子為人之赤子以己之輕意肆志為人之輕意肆志則固未有不涕泣而嫚罵者則吾知是編之出必有始則戚然悲慨然嘆者而繼則可知其輾然喜翻然笑也吾安得默默而不言乎是可見信於天下是可大白於天下華陽山人序
