body:
  text: 題辭這段功非小憫孩提惺惺救世許多頭腦藥當通神原有據此意須人探討壽群生幾行梨棗石室蘭臺開奧義只一編可把群言掃授兒醫傳家寶世情可笑都顛倒論而今心頭眼底誰人分曉痘疹痧麻童稚劫只是沉冤不少是書成金針度了斯世斯人如夢覺便晨鐘那抵斯編好保赤子長生道調寄金縷曲賜福謹題凡例一幼科古稱啞科以其言語不通病情難測故諺云寧治十男子不治一婦人寧治十婦人不治一小兒蓋甚言其難也如此然果能扼其要領則亦何難之有是書所列雖似限於篇幅然深得提綱之妙讀者幸毋忽焉一小兒醫自仲陽而下代不乏人然可傳可守者僅數家而已是書所集頗多采錄誠以理之所在有不容另措一詞者讀者慎毋以剿襲陳言見誚一治病莫要於辨寒熱虛實而小兒之病亦只惟表裡二症而已果能於表裡症中辨出寒熱虛實則自是高手學者熟玩此書自有會悟處一驚風一症前人鑿空而談遂成千古疑城千篇一律比比皆然雖間有闢之者又未足以大破其惑故遺禍至今無有底止是書辨列實具苦心閱者慎毋漠視一近世謂有病宜餓傳訛襲謬大率皆出自庸醫婦人之口自此說行因餓而死者不知凡幾予甚傷之因述不可餓論然所援引悉本聖經賢論非予臆見宜為醫所共知世有賢者果能同予矯得此偏則積德不淺矣予尤於此有厚望焉一痘瘡果能不事寒涼攻下則失手處自少自痘疹正宗出而死者更多非至愚者必不宗其說予於論內尤殷殷致意焉一種痘誠為避危就安萬全良法有力之家固知早種而單寒之子欲種弗能今春博愛堂舉行此法廣為貧家兒女種痘悉奏全功良堪嘉尚一切章程載在論中吾願有力仁人在在行之則造福不小矣一是書旁稽遠核言簡意該化出成書參以心得故能出深入淺法密方純雖多引陳言然發前人所未發者正復不少讀者其亦細心而體玩之總論第一易曰天地縕絪萬物化醇男女構精萬物化生蓋人之生也必稟天地之正氣以成形藉陰陽之化育而賦命而上古元氣渾龐太和洋溢八風正而寒暑調六氣和而雨暘若人情樸實風俗貞純是以上古之民恆多壽而少病即內經所謂上古之人和於陰陽明於術數起居有度不妄作勞春秋皆度百歲而去者是也迨於後世元氣漸薄風俗煩偷人情穿鑿名利有不時之擾嗜欲多無厭之求是以近日之民恆多病而少壽即內經所謂中古之人以酒為漿以妄為常醉以入房以欲竭其精以耗散其真不知持滿不時御神未至半百而衰者是也夫以黃帝之時即稱中古迄今複數千年來權其氣化不更薄耶是凡習兒醫者須知今昔氣運不同稟賦根荄愈薄凡於小兒之病更宜加意培植保護元氣不可妄用攻伐之劑以貽人夭札之禍也乃近日幼科不明此理動輒攻伐而又絕其乳食其呱呱者口不能言任醫冤殺束手待斃底於死亡悲夫此等惡習不知始自何人遂至相習成風流禍無已愚夫愚婦溺於其說至死不悟為嬰兒之大患而惟揚屬為尤甚籲可恨也至若書稱若藥弗瞑眩厥疾弗瘳此蓋當時因事取譬之辭非教人服藥務宜瞑眩也其如愚人引為口實乃一概投之以瞑眩殊不思小兒向稱芽兒之義夫所謂芽兒者如草木之萌芽其一點方生之氣甚微栽培護養惟恐不及而堪加之以剝削之撓施之以斧斤之利乎此誠不可也原夫易無妄九五爻辭云無妄之疾勿藥有喜象曰無妄之藥不可試也觀此則知聖人或亦有以鑑夫瞑眩之非故特示勿藥有喜之戒而我夫子亦有未達不敢嘗之語又張仲景先生傷寒論內亦有勿藥為中工之訓又張子和著儒門事親書其中有語友人陳敬之云小兒有病不如勿用庸醫但恐妻妾怪其不醫宜用湯浸蒸餅令軟丸作白丸給其妻妾以為真藥服之以聽天命最為上藥後丙戌歲群兒病泄瀉用藥者皆死惟敬之守子和之戒其兒雖病得以無恙以上所引一為聖人之至訓一為名醫之精論載在簡冊昭於日月人第習而不察耳夫以傷寒劇病抑且可以勿藥而況小兒氣血幾何豈可委之以庸醫之手試之以無妄之藥乎此子和之所以教敬之之不服藥為愈也僕承師訓久憫於此欲效忠告之良謀用救方今之惡習爰列若干門於後以貽夫世之貴小兒而好服藥者奉為金鑑云診治法論第二凡診小兒之法諸書皆以面部及手紋為識病之資其所援引率皆渺昧難憑煩瑣無要其於諸大家所謂望聞問切四者之診置聞問切三者於不講可得謂之為良醫乎夫小兒言語不通病情難識則尤當以望聞問切為診治之要蓋望其形色則有以知其邪正之盛衰審其聲音則有以別其稟賦之強弱詢其向背則有以識其性情之好惡察其脈息則有以明其表裡之寒熱苟能細心求之則表裡寒熱虛實皆得其真用藥自無不當奈何近日幼科學術更淺一遇小兒有病不是從事於表便是攻伐其里迨至真陽外越虛熱日增則清涼並進一味胡猜不獨望聞問切四者不知抑且置虛寒二症於不問嗟乎曾不知邇來氣化日薄今人稟賦更虛加以嬰兒氣血未堅臟腑柔絕些小病痛其元氣已不能支而堪庸劣之徒寒熱不分虛實莫辨妄意揣摩任情剝削者乎茲則掀翻底蘊直指精微專以望聞問切四者為綱以揭明表裡寒熱虛實六者之要俾學者有所依據庶幾不致顛倒混施誅伐無過或於嬰兒有厚幸矣至於用藥之法寧勿藥毋過劑寧輕毋重毋偏寒毋偏熱毋過散毋過攻須遵內經邪之所湊其氣必虛之訓時以保護元氣為主知乎此於嬰兒診治之道思過半矣至於虛寒敗症則非峻用溫補不可挽回毋得稍涉因循致令不救此又不可不知也表論第三小兒表症謂外感風寒其見證必先發熱然發熱之證有三最宜詳辨不可一概混同施治也其在冬月感於寒者頭痛身痛項背強惡寒壯熱無汗脈浮而緊此太陽表證用藥得法一汗即解詳見實論其感於風者頭痛鼻塞流涕發熱或有汗惡風或無汗惡寒或咳嗽乾嘔脈浮而數或緊此四時之感冒是也治法不可大發散微表之即已如易簡參蘇飲惺惺散之類主之大抵近日人情愛護小兒者眾富貴之家重衣厚褥貧賤之子亦皆衣絮以致汗液不斷腠理疏泄偶觸微風即成感冒是以邇來小兒冬月感寒之症百無一二而傷風發熱之症恆多也至若內因於虛發熱之症極多最為疑似人殊不知更宜詳辨如陽虛生寒陰虛發熱血虛發躁而熱氣虛自汗不能食而熱氣虛注夏而熱暑濕合病而熱汗後陰虛陽無所附而熱汗後陽虛陰無所附而熱陽氣下入陰中晝安靜夜煩躁而熱重陽無陰夜安靜晝煩躁而熱以上諸症同一發熱也若誤表之必死其次則又有變蒸之熱將發痘疹之熱亦同一發熱也而援守各異每見庸醫一遇發熱動皆表散殊不知病有微甚熱有虛實雖同一發熱而治法殊途攻補迥別業幼科者於臨症之際務宜細心體認必先問其病之新久曾未服藥以及一切愛惡情狀然後再察其熱之溫壯形之強弱脈之虛實色之夭澤合四者以決之庶無誤人於夭札也蓋外感為暴病其發熱也驟必手背熱脈浮身熱無汗仍須分別虛實以治之詳見虛實門若無手背熱脈浮身熱無汗等症或發熱已久則非外感證矣治者審焉附方易簡參蘇飲感感冒發熱頭痛與因痰飲凝積發而為熱並宜服之亦治中脘痞悶嘔逆噁心小兒室女尤宜服之前胡人參如無以好黨參代之紫蘇乾葛半夏茯苓各三分枳殼陳皮甘草桔梗木香各二分上㕮咀每服四錢水一盞生薑七片棗一枚煎至六分去渣服惺惺散治小兒傷寒時氣風熱頭痛目眵多睡痰壅咳嗽喘急或痘疹已出未出疑似之間人參白朮炒茯苓甘草北細辛川芎桔梗炒各等分上為末每服二錢入薄荷五葉水煎服一方有防風天花粉里論第四凡治小兒里症亦惟宜忌二字而已要在辨之明而見之確耳夫小兒元氣無多臟腑脆嫩若夫當下而不下則津液消爛所謂急下以救胃中津液是也不當下而下則裡氣受傷邪反乘虛內陷其禍更甚今將宜忌諸形症辨晰於左如稟氣素實汗不解發熱譫語舌苔黃厚渴而引飲大便秘小便赤腹滿拒按手足心熱脈沉而實此為陽邪入里宜下之雖二三日若見上項諸症亦宜下之如調胃承氣湯四順清涼飲之類少少與之貴在與病相值恐多下亡陰也不可拘於庸醫下不厭遲之說謬稱穩當必待至七日之後始下也如太陽證表未罷脈浮大惡寒者此邪在表雖十餘日亦不宜下嘔多者不可下太陽陽明合病喘而胸滿者不可下惡水者不可下稟賦虛者不可下逆厥者不可下仲景先生云日數雖多但有表證而脈浮者猶宜發汗日數雖少若有里證而脈沉者即宜下之此不可不知也此外有因氣虛陽脫而譫語者乃大虛之症當用參附之劑不得認為實症而誤下之也慎之慎之至於傷食停積小兒雖間亦有之然皆必由脾虛不運而致經所謂邪之所湊其氣必虛者是矣每見庸醫肆行克伐或遇表證亦云有里以致小兒外邪未解裡氣已傷往往變症蜂起而不可救受此害者不知凡幾殊堪痛恨曾不知下者下其邪耳非飲食積滯之謂也世人陰受此害者比比矣故特表而出之兼詳實論附方調胃承氣湯治太陽陽明不惡寒反惡熱大便秘結日晡潮熱凡陽明病有二證在經者當解肌入腑者當攻下大黃芒硝甘草各等分上㕮咀每用一二錢量兒大小水煎消息服之四順清涼飲治大人小兒血脈壅實臟腑生熱面赤煩渴睡臥不寧大便秘結大黃當歸芍藥甘草各等分上㕮咀量兒大小每服一二錢水煎服寒論第五小兒屬寒之症有外感有內傷有症變虛寒三者不同治法各異假如內傷必由脾土虛寒或稟賦不足或將護失宜或乳哺不節以致食不運化而見清冷吐瀉者但察其面色萎黃肢涼神倦脈沉無力安靜不渴此屬陽虛生寒宜五君子煎理中湯主之抑或能食之兒過餐生冷而見上項諸症者亦理中湯主之至若症變虛寒則由元氣素虛五臟虧損或因寒涼克伐陽氣受傷而見面青唇黯吐瀉手足並冷者此屬脾土虛寒乾薑理中湯主之若面色㿠白吐瀉腹痛口鼻氣冷者屬寒水侮土益黃散主之若更兼吃逆手足指冷用六君子湯加炮姜肉桂如不應急加附子其次或以病後或以吐瀉或以誤用藥餌或受風寒而致氣微神緩昏睡露睛痰鳴氣促驚跳搐搦如俗所謂慢驚者此屬脾腎虛寒之候宜溫補之詳見辨驚風之誤論再其次則脾腎虛寒之甚以致吐瀉不止者宜附子理陰煎或六味回陽飲量兒大小與之若但泄瀉不止者宜胃關煎主之第吐瀉之症亦間有屬熱者但當以手足寒溫脈象遲數面色青赤渴與不渴為辨至如外感寒邪則其病在表宜詳表論茲不復贅此外則又有初生小兒百日之內覺口冷腹痛身起寒粟時發戰慄曲足握拳晝夜啼哭不已或口噤不開者名曰胎寒亦或生後昏昏多睡間或哯乳瀉白若不早治心變虛寒敗症宜以沖和飲當歸散合和水煨姜煎服之使之微泄泄行進勻氣散調補泄止氣勻神安痛定手足舒伸次用參苓白朮散以養胃氣白芍藥湯去其寒濕乳母宜節生冷飲食庶易瘥也又手足稍冷唇面微青額上汗出不顧乳食至夜多啼夜重日輕腹痛腸鳴泄瀉清水間有不泄頗似前症但無口冷寒戰者名曰臟寒亦在百日之內有之皆因臨產在地稍久冷氣侵逼或以涼水攙湯洗兒或斷臍帶短而又結縛不緊為寒氣所傷如此宜以白芍藥湯及沖和飲加鹽炒茴香茱萸水姜煎乳母同服又胃中虛冷面色㿠白腹痛不思食者益黃散主之若不下利調中丸主之大都小兒病症虛寒者多凡一見面色青白肢冷神疲脈沉無力蜷曲而臥食少不渴聲音遲緩者皆是虛寒之候急宜溫補業幼科者毋得狃於俗見謬謂小兒陽體多熱不敢溫補致多害事宜深戒之附方五君子煎治脾胃虛寒嘔吐泄瀉而兼濕者人參白朮炒茯苓乾薑各等分炙甘草減半上㕮咀水煎服理中湯治太陰病自利不渴陰寒腹痛短氣咳嗽霍亂嘔吐飲食難化胸膈噎塞或瘧疾瘴氣瘟疫中氣虛損久不能愈或中虛生寒等證人參白朮炒乾薑炒炙甘草各三兩上為末每服二三錢水煎溫服益黃散治脾胃虛寒又名補脾散陳橘皮一兩青橘皮訶子肉甘草各半兩銼炒丁香二錢上為細末每服二錢水一盞煎至六分食前溫服東垣先生云閻孝忠編集錢氏方以益黃散補土又言風旺必克脾土當先實其脾昧者不審脾中寒熱一例用補脾藥又不審藥中有丁香青皮辛熱大瀉肺金脾虛之症豈可反瀉其子惟寒水反來侮土中寒嘔吐腹痛瀉痢青白口鼻中氣冷益黃散神治之藥也如因服熱藥巴豆之類過劑損其脾胃或因暑天傷熱積熱損其脾胃而成吐瀉口鼻中氣熱而成慢驚者不可服之六君子湯治脾胃虛弱飲食少思或久患瘧痢或食飲難化或嘔吐吞酸或咳嗽喘促若虛火等證須加炮姜其功尤速人參白朮炒茯苓各二錢炙甘草製半夏陳皮各一錢上薑棗水煎附子理陰煎治真陰虛弱脹滿嘔噦有物無聲曰吐有聲無物曰噦有物有聲曰嘔痰飲噁心吐瀉腹痛及命門火衰陰中無陽等證熟地三五七錢或一二兩當歸二三錢或五七錢製附子一二三錢炙甘草一二錢乾薑炒黃一二錢或加肉桂一二錢水二鍾煎七八分熱服此方系理陰煎加附子故名附子理陰煎其理陰煎功用甚宏詳見本書茲未細錄六味回陽飲治陰陽將脫等症人參一二兩或數錢製附子二三錢炮乾薑二三錢炙甘草一錢熟地五錢或一兩當歸身三錢如泄瀉者或血動者以冬朮易之多多益善水二鍾武火煎七八分溫服如肉振汗多者加炙黃耆四五錢或一兩或冬白朮三五錢如泄瀉者加烏梅二枚或北五味二十粒亦可如陽虛上浮者加茯苓二錢如肝經鬱滯者加肉桂二三錢胃關煎治脾腎虛寒作瀉或甚至久瀉腹痛不止冷痢等症熟地三五錢或一兩山藥炒二錢白扁豆炒二錢炙甘草一二錢焦乾姜一二三錢吳茱萸制五七分白朮炒一二三錢水二鍾煎七分食遠溫服瀉甚者加肉豆蔻一二錢麵炒用或破故紙亦可氣虛勢甚者加人參隨宜用陽虛下脫不固者加製附子一二三錢腹痛甚者加木香七八分或加厚朴八分滯痛不通者加當歸二三錢滑脫不禁者加烏梅二個或北五味子二十粒若肝邪侮脾者加肉桂一二錢沖和飲治感冒風寒頭疼發熱肩背拘急噁心嘔吐腹痛膨脹兼寒濕相搏四肢拘急冷氣侵襲腰足疼痛蒼朮米泔水浸一宿去粗皮銼片炒微黃色一兩二錢人參去蘆前胡去蘆桔梗炒各五錢枳殼去穰麩炒微黃色麻黃去節陳皮去白各三錢川芎白芷半夏湯洗七次薑汁浸曬乾炒當歸酒洗薄桂去粗皮赤茯苓去皮白芍藥各一錢半乾薑厚朴去粗皮薑汁浸一宿慢火炒乾各二錢甘草炙七錢半上銼每服二錢水一盞姜二斤蔥白一根煎七分無時溫服傷冷噁心嘔吐煨姜同煎開胃進食加棗子煎空心溫投寒疝痛入鹽炒茱萸茴香同煎當歸散順調氣血和解表裡爽利心腹疏理百病及治溫熱停積自痢煩躁不寧當歸去蘆酒洗赤芍藥各二兩甘草半生半炙一兩大黃半生半泡一兩二錢川芎麻黃制各半兩熱論第六小兒屬熱之症脈必洪數而實色赤作渴煩躁飲冷聲音雄壯二便秘結然其中有屬虛者最宜明辨不可不慎也假如心熱則額間色赤煩躁驚悸若飲水或叫哭者屬心經實熱宜瀉心散以清心火若色微赤困臥驚悸熱渴飲湯則屬心經虛熱宜秘旨安神丸以生心血肝熱則左臉青赤項強頓悶目札瘛瘲此屬肝經風熱宜柴胡清肝散主之若色微赤倏熱咬牙則屬肝經虛熱宜地黃丸主之肺熱則右臉赤或主風邪氣粗咳嗽發熱宜參蘇飲或惺惺散主之若飲水者屬肺經實熱宜瀉白散主之若色微赤小便不利乃脾肺燥熱不能化生腎水宜黃芩清肺飲主之若哽氣出氣唇白氣短則屬肺經虛熱宜五味異功散主之脾熱則鼻赤身熱飲水乳食如常屬脾胃實熱宜瀉黃散清熱理脾若色微赤身涼飲湯乳食少思則屬脾經虛熱宜五味異功散補中健脾腎熱則頦間色赤足不欲覆若腎與膀胱氣滯熱結而小便不通者宜五苓散主之若色微赤則屬膀胱陽虛陰無所化宜六味地黃丸主之至若吐瀉二症間有因於熱者亦宜詳辨假如吐乳色黃不能受納此屬胃經有熱宜先用瀉黃散次用人參安胃散然當驗其手指熱則屬胃熱若手指冷則屬胃寒矣宜兼詳寒論至如因熱而瀉者則必大便黃赤有沫小便赤少口乾煩躁宜四苓散主之如更兼右腮色赤飲冷者屬胃經實熱宜瀉黃散主之若右腮微赤喜熱惡冷則屬胃經虛熱矣宜白朮散主之若右腮及額間俱赤屬心脾翕熱宜瀉黃散加炒黑黃連若左頰右腮俱赤屬肝火乘脾宜四君子湯加柴胡大抵瀉症最傷元氣若熱瀉過甚必變虛寒宜兼參寒論蓋始病而熱者邪氣勝則實也終變為寒者真氣奪則虛也久病而熱者內真寒而外假熱也久瀉元氣虛寒急宜溫補不得誤執熱論再如陽虛發躁內實真寒而外似熱症者如目赤作渴身熱惡衣揚手擲足欲投於水但診其脈洪數無倫重按無力是為假熱宜急投參附之劑引火歸元若誤進清涼入口必死症之疑似有如此者醫者可不慎歟此外如胎毒火丹口瘡重舌衄血便血以及疳熱等症雖亦云屬熱然皆各有虛實之不同是亦不可不明察之也附方瀉心散治心經實熱黃連上為末每服五分臨臥溫水調下秘旨安神丸治心血虛而睡中驚悸或受驚嚇而作人參半夏制酸棗仁炒茯神各一錢當歸酒洗橘紅赤芍藥炒各七分五味子杵五粒甘草炙三分上為末薑汁糊丸芡實大每服一丸生薑湯下柴胡清肝散治肝膽三焦風熱怒火或乍寒乍熱往來寒熱發熱或頭髮瘡毒等症柴胡一錢半黃芩炒一錢人參一錢川芎一錢山梔炒一錢半連翹五分甘草五分桔梗八分上水煎服地黃丸治腎肝血虛燥熱作渴小便淋秘痰氣上壅或風客淫氣患瘰癧結核或四肢發搐眼目瞤動或咳嗽吐血頭目眩暈或咽喉燥痛口舌瘡裂或自汗盜汗便血諸血或稟賦不足肢體瘦弱解顱失音或畏明下竄五遲五軟腎疳肝疳或早近女色精血虧耗五臟齊損凡屬腎肝諸虛不足之症宜用此以滋化源其功不可盡述熟地黃八錢杵膏山茱萸肉乾山藥各四錢澤瀉牡丹皮白茯苓各三錢上為末入地黃膏量加米糊丸桐子大每服數錢量兒大小溫水空心化下行遲鶴膝加鹿茸牛膝五加皮參蘇飲治感冒發熱頭痛傷風咳嗽傷寒嘔吐胸膈不快痰飲凝結紫蘇前胡陳皮製半夏乾葛茯苓枳殼炒桔梗人參各三分甘草一分上為末每用一二錢薑棗水煎服瀉白散地骨皮桑白皮炒各一兩甘草炙一錢上為末每服一二錢入粳米百粒水煎黃芩清肺飲治肺熱小便不利宜用此清之梔子黃芩減半上為末每服一二錢水煎如不利加鹽豉二十粒五味異功散治脾胃虛寒飲食少思嘔吐或久患咳嗽虛浮氣逆腹滿等症人參白朮炒茯苓各等分甘草炙陳皮減半上加薑棗水煎服瀉黃散治脾熱吐舌藿香葉甘草各七分半山梔一錢石膏五分防風二錢上用蜜酒微炒為末每服一二錢水煎五苓散治暑熱煩躁霍亂泄瀉小便不利而渴淋澀作痛下部濕熱白朮豬苓茯苓各七分半肉桂五分澤瀉一錢二分上為細末每服一二錢水煎人參安胃散治脾胃虛弱傷熱乳食嘔吐瀉痢人參一錢黃耆二錢生甘草炙甘草各五分白芍藥酒炒七分白茯苓四分陳皮三分黃連炒二分上每服二三錢水煎四苓散即前五苓散去肉桂白朮散治脾胃氣虛作渴飲湯或因吐瀉津液虧損煩渴引飲或脾胃虛弱腹脹瀉渴弄舌流涎手足指冷宜服之和胃氣生津液人參白朮炒藿香葉木香甘草白茯苓各一兩乾葛二兩上為末每服二錢水煎四君子湯治脾胃虛弱飲食少思或大便不實體瘦面黃或胸膈虛痞吞酸痰嗽或脾胃虛弱善患瘧痢等症人參白朮炒茯苓各二錢甘草炙一錢上加薑棗水煎服或加粳米百粒惺惺散方見表論虛論第七小兒虛症無論病之新久邪之有無但見面色青白恍惚神疲口鼻虛冷噓氣怫鬱肢體倦怠軟弱喜熱惡涼泄瀉多尿或乍冷乍溫嘔惡警惕上盛下泄夜則虛汗睡而露睛屈體而臥手足指冷聲音短怯脈象緩弱虛細是皆屬虛之症急宜溫補脾胃為要仍須分別以治之如氣虛者四君子湯血虛者四物湯氣血俱虛者八珍湯氣虛自汗者四君子湯血虛發躁者當歸補血湯表虛者宜固其氣裡虛者宜實其中陽虛惡寒者宜溫分肉陰虛發熱者宜滋腎肝脾肺氣虛者四君子湯五味異功散補中益氣湯肝腎血虛者六味丸加味四物湯汗後陰虛陽無所附而熱者四物加參耆汗後陽虛陰無所附而熱者四君加芎歸久事表散而身熱不退者陽氣虛也補中益氣湯過用攻下而滑泄不禁者脾腎虛也六神散胃關煎又虛必生寒宜詳寒論至於虛熱亦詳見熱論此外虛症尚多詳見各條宜並玩之附方四物湯治血虛營弱一切血病當以此為主熟地黃當歸各三錢川芎一錢白芍藥二錢水二鍾煎服八珍湯治氣血兩虛調和陰陽人參白朮茯苓等分炙甘草減半熟地當歸等分白芍減半川芎倍減水煎或加薑棗粳米同煎當歸補血湯治血氣損傷或因誤攻致虛肌熱口渴目赤面紅脈大而虛重按全無及病因飢飽勞役者黃耆炙一兩當歸三錢水一鍾半煎八分服補中益氣湯治勞倦傷脾中氣不足清陽不升外感不解體倦食少寒熱瘧痢氣虛不能攝血等症人參黃耆炙白朮炒甘草炙各一錢五分當歸一錢陳皮五分升麻柴胡各三分上加薑棗水煎空心午前服加味四物湯即前四物湯加山梔柴胡丹皮六神散治面青啼哭口出氣冷或泄瀉不乳腹痛曲腰四肢厥冷人參白朮炒山藥炒各五錢白茯苓白扁豆炒各一兩甘草炙二錢上為末每服二三錢薑棗水煎四君子湯方見熱論五味異功散方見熱論六味丸方見熱論胃關煎方見寒論實論第八小兒屬實之症惟表裡食積三者而已蓋表邪實者必頭項體痛腰痛背強壯熱無汗脈象浮緊有力宜從表散如在冬月宜羌活沖和湯主之若在春夏秋三時則宜易簡參蘇飲或惺惺散之類主之若兼倦怠昏睡則屬正不勝邪宜四柴胡飲或五柴胡飲之類主之里邪實者必舌胎黃厚口燥唇瘡作渴喜飲大小便秘腹痛拒按聲音洪壯伸體而臥睡不露睛手足指熱脈象沉數有力宜從攻下如調胃承氣湯或四順清涼飲之類主之若汗後身熱不退脈象弦洪數實大便堅秘者柴胡飲子夫所謂實者邪氣實耳非元氣有餘之謂也醫者臨症之際果屬實邪於應表應下之藥皆當作小劑少少與之要在中病即止不可過劑務宜顧定元氣斯無孟浪僨事之非至於飲食停積必寸口脈浮大按之反澀腹皮熱大便醙臭然必由脾虛不運而致於消導藥中慎毋損及中氣宜多溫中健脾之品俾得自強不息之妙如消乳丸香橘餅理中湯之類主之若傷食甚而或兼厚味積熱者宜大安丸少少與之俟食積稍消仍當以五味異功散調補之此外如目直大叫項急煩悶肝之實也瀉青丸抑肝散主之若筋急血燥抽搐勁強斜視目瞪則屬肝之虛矣地黃丸主之叫哭發熱飲水而搐心之實也導赤散瀉心湯主之若驚惕不安則屬心之虛矣秘旨安神丸主之困睡身熱飲水脾之實也瀉黃散主之若嘔吐泄瀉不食痞滿倦臥牙緊流涎手足牽動則屬脾之虛矣益黃散或六君子加炮姜木香主之悶亂喘促飲水肺之實也瀉白散主之若氣促多汗則屬肺之虛矣四君子湯或五味異功散主之腎無實惟痘瘡黑陷為邪氣實而腎則虛也地黃丸主之若二便不禁津液枯槁聲喑目戴肢體厥逆腎虛極也補中益氣湯兼六味地黃丸主之大抵小兒實症無多若稟賦素虛或病患已久或過服克伐之劑皆當作虛症施治不得概以為實也慎之慎之附方羌活沖和湯治四時不正之氣感冒風寒憎寒壯熱頭痛身痛口渴人人相似者此方主之薛氏云治太陽無汗發熱頭痛惡寒脊強脈浮緊又治非時暴寒人中之頭痛惡寒發熱宜此方治之以代麻黃湯用太陽經之神藥也羌活防風蒼朮白芷川芎生地黃芩甘草細辛減半上加薑棗水煎熱服取汗四柴胡飲治元氣不足或忍飢勞倦而外感風寒或六脈緊數微細正不勝邪等症必須培助元氣兼之解散庶可保全宜此主之若但知散邪不顧根本未有不元氣先敗者慎之慎之柴胡一二三錢甘草炙一錢生薑三五七片當歸二三錢瀉者少用人參二三錢或五七錢酌而用之水二鍾煎七八分溫服如胸膈滯悶加陳皮一錢五柴胡飲脾土為五臟之本凡中氣不足而外邪有不散者非此不可此與四柴胡飲相表裡但四柴胡飲止調氣分此則兼培血氣以逐寒邪尤切於時用者也凡傷寒瘧疾痘瘡皆所宜用柴胡一二三錢當歸二三錢熟地三五錢白朮二三錢白芍炒用一錢五分甘草炙三錢陳皮酌用或不必用水一鍾半煎七分食遠熱服寒勝無火者減芍藥加生薑三五七片或炮乾薑一二錢或再加桂枝一二錢則更妙脾滯者減白朮氣虛者加人參隨宜腰痛者加杜仲頭痛者加川芎勞倦傷脾陽虛者加升麻一錢柴胡飲子解肌熱蒸熱積熱或汗後餘熱脈洪實弦數大便堅實者柴胡人參各五分黃芩白芍各七分當歸一錢甘草四分大黃八分上每服一二錢水煎按此方用藥頗善但大便如常者勿得輕用大黃消乳丸治嘔吐消乳食脈沉者傷食不化也香附炒砂仁陳皮神麯炒甘草炙麥芽炒等分上為末米糊丸黍米大每服二十丸薑湯下香橘餅治傷冷積瀉木香青皮各一錢陳皮二錢半厚朴神麯炒麥芽炒各半兩上為末蜜和為餅每服一枚米飲調下病久及元氣虛者勿用大安丸治飲食酒積停滯胸膈痞滿腹脹神麯炒陳皮半夏制茯苓各一兩山楂肉蒸曬三兩連翹蘿蔔子炒各五錢白朮二兩上為末粥丸綠豆大量大小每服一二十粒米飲下一方尚有炒麥芽一兩黃耆五錢瀉青丸治肝膽火並小兒急驚發搐眼赤睛疼龍膽草當歸川芎防風羌活山梔大黃等分上為末煉蜜丸桐子大量大小每服十丸抑肝散治肝經虛熱發搐或發熱咬牙或驚悸寒熱或木乘土而嘔吐痰涎腹脹少食睡不安軟柴胡甘草各五分川芎八分當歸白朮炒茯苓釣藤鉤各一錢上水煎子母同服以蜜丸名抑青丸導赤散治心火及小腸熱證小便赤澀而渴生地木通生甘草各等分上加竹葉二十片水煎服一方加人參麥門冬易簡參蘇飲方見表論惺惺散方見表論調胃承氣湯方見里論四順清涼飲方見里論理中湯方見寒論五味異功散方見熱論地黃丸方見熱論瀉心湯即瀉心散方見熱論秘旨安神丸方見熱論瀉黃散方見熱論益黃散方見寒論六君子湯方見寒論瀉白散方見熱論四君子湯方見熱論補中益氣湯方見虛論辨驚風之誤論第九小兒急慢驚風之說古書不載後人妄立名目概用金石腦麝之品貽害至今殺人不知凡幾雖代有名哲因世俗膠結既久猝難更正故著作之家不得不仍以驚風二字目之矣夫小兒形氣未充易生恐怖又何嘗無驚嚇之症是凡驟聞異聲驟見異形或跌撲叫呼雷聲鼓樂雞鳴犬吠一切聞所未聞見所未見皆能致病治法急宜收復神氣為要此即內經所謂大驚猝恐之症是也但當以驚嚇二字立名不當以驚風二字目之矣此立名之妄其誤一也其次亦有因驚嚇而致肝心二臟木火俱病者用藥但宜瀉心平肝其病自已亦非金石腦麝所宜投其誤二也至於慢驚或因吐瀉或因病後或因過服克伐之劑或脾胃素虛以致臟腑虛損已極全屬虛寒敗症急宜溫補無風可逐無驚可療而名之曰慢驚更屬謬妄其誤三也此外如傷風發搐傷食發搐潮熱發搐將見痘疹發搐太陽病變痙以及天釣內釣癇症之類皆有搐掣反張強直之狀世人不知昧於分別往往亦混作驚風施治且或委之於無知婦人之手致令無辜赤子橫遭夭折其誤四也今將以上各條辨症論治之法匯列於後俾臨症者有所指歸一洗從前陋習庶幾登赤子於壽域矣乎大驚猝恐小兒氣怯神弱猝見異形猝聞異聲最傷心膽之氣內經云大驚猝恐則氣血分離陰陽破散經絡厥絕脈道不通陰陽相逆經脈空虛血氣不次乃失其常又驚則氣散又恐傷腎驚傷膽其候則面青糞青多煩多哭睡臥驚惕振動不寧治法急宜收復神氣為要宜秘旨安神丸或獨參湯茯神湯之類主之若妄進金石腦麝之品是猶落井而又下之以石矣因驚嚇而致肝心二臟木火俱病者乳兒之母嗜食肥甘或酒後乳兒或將護失宜衣衾太暖致令小兒邪熱鬱蒸積於心而傳於肝蓋心藏神而肝藏魂猝被驚觸神魂恐怖心肝之氣亦傷心虛則邪熱得以乘之肝虛則內風旋繞以致夜臥不穩或笑或哭忽爾悶絕目直上視牙關緊急口噤不開手足搐掣身熱面赤脈數引飲口中氣熱二便黃赤或秘搐而有力為邪氣實宜導赤散更加乾地黃防風竹葉連進三服或兼辰砂抱龍丸少少與之用以導心經之邪熱息肝臟之虛風其病即愈倘肆用香散走竄或寒涼攻伐之劑必變為虛寒敗症不治者多矣宜兼詳虛實二論虛寒敗症凡小兒病後或吐後瀉後或脾胃素虛或誤服藥餌或過服克伐之劑或感受風寒而致氣微神緩昏睡露睛手足厥冷身體或冷或熱或吐或瀉涎鳴氣促口鼻氣冷驚跳瘛瘲搐而無力乍發乍靜面色淡白或眉唇青赤脈象沉遲散緩或細數無神此蓋舉世共詫為慢驚風者是也殊不知病本於虛臟腑虧損已極無風可逐無驚可療全屬虛寒敗症不必盡由驚嚇而致蓋脾虛不能攝涎故津液妄泛而似痰火虛則身寒口中氣冷木虛故搐而無力每見世醫狃於陋習輒作驚風施治致令百無一救此無他良由前人立名之不慎以致此耳若更乞靈於無知婦人則其死更速蓋斯時一點真氣已屆半續半離之際一經動搖鮮有不隨手而脫者籲可哀也主治之法急宜溫補脾胃為要如四君子湯五味異功散加當歸酸棗仁東垣黃耆湯若脾土虛寒甚者六君子加炮姜木香不應者急加附子脾腎虛寒之甚或吐瀉不止者附子理陰煎或六味回陽飲若但泄瀉不止者胃關煎若元氣虧損已極而至昏憒者急灸百會穴百會在頭頂正中取之之法用線量前後髮際及兩耳尖折中乃是穴也兼服金液丹凡此貴在辨之於早而急為溫補之始克有濟倘稍涉遲疑則必致不救慎之慎之宜兼詳虛論傷風發搐凡小兒身熱脈浮口中氣熱呵欠頓悶手足搐搦者此因傷風而得之宜大青膏或人參羌活散之類主之若搐而肢體倦怠口氣不熱則屬虛矣宜異功散以補脾釣藤飲以制肝則搐自止矣若月內小兒搐而鼻塞亦屬風邪所傷宜用蔥白七莖生薑一片細擂攤紙上合置大人掌中令熱急貼囟門案方書頂中央旋毛中為百會百會前一寸為前頂百會前三寸即囟門少頃即搐止而鼻亦利矣尋常小兒傷風亦可用之愈後取去仍當以綿胭脂一片周圍以熱麵糊護之以蔽大人口鼻之氣為善傷食發搐凡小兒飲食過度致傷脾胃嘔吐多睡不思乳食忽然而搐者此因傷食得之宜消食丸若食既消而前症仍作或見虛象者此脾土傷而肝木乘之也宜六君子加釣藤鉤以健脾平肝慎勿肆用消導而致變壞症也潮熱發搐小兒潮熱發搐謂因潮熱不已血虛筋急而發搐也所謂潮熱者謂時間發熱過時即退來日依時而發如江海之潮汐而罔或愆期也原其所自由於因熱而致搐不由驚嚇而致病若妄作荒誕之驚風施治則大誤矣主治之法要不外乎虛實寒熱四者而已假如病因於肝其候則身體壯熱目上視手足動搖口生熱涎頸項強急當用地黃丸以補腎瀉青丸以治肝若兼作渴飲冷便結屬肝膽經虛熱用柴芍參苓散若更兼自汗盜汗屬肝膽經血虛用地黃丸若口吻流涎屬肝木克脾土用六君子湯主之假如病因於心其候則心惕目上視白睛赤牙關緊急口內涎生或渴而飲水手足動搖當用導赤散以治心地黃丸以補肝若渴而飲湯體倦不乳屬土虛木旺用六君子地黃丸主之假如病因於肺其候則不甚搐而喘目微斜視身熱如火睡露睛手足冷大便淡黃水當用益黃散以補脾瀉青丸以治肝導赤散以治心若身體微熱屬脾肺虛熱用異功散若喘瀉不食手足逆冷屬脾肺虛寒用六君子加炮姜木香若久病而元氣虛者用六君子地黃丸主之假如病因於腎其候則不甚搐而臥不穩身體溫壯目睛緊斜喉中有痰大便銀褐色乳食不消多睡不省當用益黃散以補脾導赤散以治心若吐瀉不乳厥冷多睡屬寒水侮土用益黃散不應者用六君子加薑桂主之大都治搐之法皆當以固脾肺之氣為先蓋土旺金生則肝木有制不來乘脾其搐自止治者審焉宜兼詳虛實二論將見痘疹發搐凡小兒於將見痘疹之時必先發熱熱甚則陰分受傷或心移熱於肝以致風火相搏而見手足搐搦口眼歪斜者亦常有之經云諸風掉眩皆屬於肝又云諸痛癢瘡皆屬於心蓋心主熱熱甚則肺經受克不能制伏肝木熱則生風風火相搏神氣不安故驚惕而發搐也苟或妄以驚藥治之則心寒而肌斂毒必內陷害可勝言哉主治之法當察其所屬而調劑之如發熱無汗表邪甚而搐者柴歸飲或惺惺散之類主之煩渴飲冷裡熱甚而搐者導赤散或辰砂六一散之類主之肝膽熱甚大便秘結煩躁而搐者瀉青丸主之熱甚見血而搐者犀角地黃湯主之風熱既退則痘隨出而搐自止矣然此皆治實之法此外有因稟賦素虛心脾不足而搐者但當以面色青白神氣怯弱為辨宜七福飲或養心湯或六氣煎加棗仁主之太陽病變痙仲景先生云身熱足寒頭項強急惡寒時頭熱面赤目脈赤獨頭面搖卒口噤背反張者痙病也發熱無汗反惡寒者名剛痙發熱汗出不惡寒者名柔痙又曰太陽病發汗過多因致痙小兒肌膚嫩薄腠理不密血液未充易於感冒往往初傳太陽一經便覺身強多汗筋脈牽動人事昏沉是即變痙症也良由熱甚傷陰汗多傷液血氣內虛筋失所養以致此耳主治之法若初病便痙表邪未解陰虛無汗身熱者宜人參羌活散或三柴胡飲或四柴胡飲之類主之若因汗出太多或過事表散陽氣虛甚者宜參附湯參歸湯人參建中湯之類主之若汗出兼火脈見洪滑證見煩躁或痰熱甚者用丹溪人參竹瀝之法主之若身微熱脈不緊數此表邪已隨汗解不必再用發散只宜專顧正氣為要宜五福飲之類主之若大虛而脈見沉細陰勝者宜大營煎大補元煎十全大補湯之類主之其次有以誤下傷陰或泄瀉過度或濕症誤汗或瘡家誤汗或亡血過多或婦人產後或傷暑或中風之類種種不一皆能致痙奈何世醫不明此理以小兒太陽初病變痙而謬名之曰急驚風以汗下過度神氣微弱口開眼張而名之曰慢驚風以婦人產後血虛發痙而名之曰產後驚風以損傷亡血過多變痙而名之曰破傷風以暑傷正氣汗多厥逆而名之曰暑驚風以及體虛非風之類不知皆屬極虛之症動以驚風為名輒投開關鎮墜之品致使真氣益虛邪反內陷死亡相繼何生民之不幸若此其甚也業幼科者毋得以頭搖口噤反張搐搦便妄作驚風施治以致誤人不救也天釣內釣天釣之狀發時頭目仰視驚悸壯熱兩目反張淚出不流手足搐掣不時悲笑如鬼祟所附甚者爪甲皆青由乳母厚味積熱貽兒為患或外感風邪所致宜內服釣藤飲外用雙金散吹鼻至於內釣其狀則腹痛多喘唇黑囊腫傴僂反張眼尾赤色或內臟抽掣作痛狂叫或泄瀉縮腳亦由乳母起居不慎或為寒氣所乘而致宜釣藤飲五味異功散加乾薑木香甚者宜加肉桂進乳食者可治若因乳母鬱怒傷肝宜兼治其母宜用逍遙散加熟地或加味歸脾湯俱加漏蘆子母同服癇症小兒癇症多因稟受先天不足或因妊母七情所傷傳兒為患發之之狀其候則神氣怫鬱眼瞪面目牽引口噤涎流肚腹膨脹手足搐掣或項背反張或腰脊強直或仆地作聲醒時吐沫但當以四體柔弱發而時醒者是即癇症也第五臟不同治法各異陰陽有別難易殊途宜詳言之假如面赤目瞪吐舌齧唇心煩氣短其聲如羊者此心癇也宜養心湯妙香散主之假如面青唇青兩眼上竄手足攣掣反折其聲如犬者此肝癇也宜地黃丸主之若搐而有力宜柴胡清肝散主之假如面黑目振口吐涎沫形體如屍其聲如豬者此腎癇也宜地黃丸大劑煎湯主之假如面如枯骨目白反視驚跳反折搖頭吐沫其聲如雞者此肺癇也宜補肺散主之若面色萎黃土不生金也宜異功散主之若面赤色陰火上衝於肺也宜地黃丸主之假如面色萎黃目直腹滿四肢不收其聲如牛者此脾癇也宜異功散主之若面青瀉利飲食少思木來乘土也宜六君子加木香柴胡主之以上五臟所屬主治之大法也至若陰陽難易則以發熱抽掣仰臥面色光澤脈浮者為陽易治若身冷不搐覆臥面色黯黑脈沉者為陰難治要皆元氣不足之症也通宜用紫河車研膏加人參當歸末糯米粥糊丸多服取愈若妄用祛風化痰克伐之劑或初發時誤作驚風施治者必死大凡小兒平日宜察其耳後高骨間若有青脈紋者宜即抓破出血可免斯患此外又有因汗出當風或脫換衣服風邪乘虛暗襲致見目青面紅迷悶搐掣涎潮屈指如計數者名曰風癇宜先用消風丸少少與之繼即用補中益氣湯兼六味地黃丸或八珍湯之類主之兼宜服紫河車丸又有因傷食過甚以致噯吐醙氣發搐大便醙臭者名曰食癇即俗所謂食厥者是也宜詳傷食發搐條茲不再贅上凡十條其候雖各有不同而其搐搦之狀似與世之所謂驚風者相彷彿其實病各不同主治亦互異真不啻有霄壤之別冰炭之分焉究其相沿概謂驚風之說由於不細心探討前人之書但概謂之驚風則其法為較通俗而易耳殊不知此門一開遂令天下業幼科者只抱數方便為神術或更獨標其名曰驚科大可嘆也吾今而立是說非發前人所未發實啟後來之大覺耳吾於操縵者有厚望焉附方獨參湯治諸氣虛氣脫及反胃嘔吐喘促粥湯入胃即吐凡諸虛症垂危者人參二兩如無力之家以上好黨參代之用水一升煎取四合乘熱頓服日再進之兼以人參煮粥食之尤妙茯神湯治膽氣虛寒頭痛目眩心神恐懼或是驚癇人參黃耆炒棗仁炒熟地白芍炒柏子仁炒五味子茯神各一兩桂心甘草炒各五錢上為末每服二三錢水煎辰砂抱龍丸此藥利驚疏風豁痰清熱並治傷寒傷風咳嗽生痰喘急昏沉發熱鼻流清涕或風暑熱症睡中驚掣痧疹癍瘡胎風胎驚胎熱等症邪氣實者天竺黃四錢須要嫩白者牛膽星一兩硃砂四錢一半為衣天麻五錢雄黃秋冬三錢春減半夏二錢麝香三分痘疹中不用防風三錢甘草三錢上為細末蜜丸芡實大雪水糊丸尤佳薑湯或薄荷湯磨服痘疹時行加天花粉四錢同藥糊丸東垣黃耆湯治驚論外物驚宜鎮心以黃連安神丸若氣動所驚宜寒水石安神丸大忌防風丸治風辛溫之藥必殺人何也辛散浮溫熱者火也能令母實助風之氣盛皆殺人也因驚而泄青色先鎮肝以硃砂之類勿用寒涼之氣大禁涼驚丸風木旺必克脾胃當先實其土後瀉其木閻孝忠編集錢氏方以益黃補土誤矣其藥有丁香辛熱助火火旺土愈虛矣青橘皮瀉肺金丁香辛熱大瀉肺與大腸脾實當瀉子今脾胃虛反更瀉子而助火重虛其土殺人無疑矣其風木旺證右關脈洪大掌中熱腹皮熱豈可以助火瀉金如寒水來乘脾土其病嘔吐腹痛瀉痢青白益黃散聖藥也今立一方先瀉火補金大補其土是為神治之法黃耆二錢人參一錢甘草炙五分上㕮咀作一服水一大盞煎至半盞去渣食遠服加白芍藥尤妙此三味皆甘溫能補元氣甘能瀉火內經云熱淫於內以甘瀉之以酸收之白芍藥酸寒寒能瀉火酸味能瀉肝而大補肺金所補得金土之位大旺火虛風木何由而來剋土然後瀉風之邪金液丹舊方主病甚多大抵治氣羸凡久疾虛困久吐利不瘥老人臟秘傷寒脈微陰厥之類皆氣羸所致服此多瘥大人數十丸至百丸小兒以意裁度多少皆粥飲下羸甚者化灌下小兒久吐利垂困藥乳皆不入委頓待盡者並與數十丸往往自死得生少與即無益嘗親見小兒吐利已極已氣絕棄諸地知其不救試謾與服之復活者數人硫黃十兩上取精瑩者研碎入罐子及八分為度不可滿外用益母草同井泥搗因濟罐外約厚半寸置平地以瓦片覆罐口四面炭五斤擁定以熟火一斤自上燃之候罐子九分赤口縫有碧煙急退火以潤灰三斗覆至冷剖罐取藥削去沉底滓濁准前再煅通五煅為足急用可三煅止藥如熟雞卵氣取並罐埋潤地一夜又以水煮半日取藥柳木槌研細滴水候揚之無滓更研令乾每藥一兩用蒸餅一兩湯釋化同搗丸之曝乾密貯聽用大青膏治傷風痰熱發搐天麻青黛各一錢白附子煨烏蛇酒浸取肉焙蠍尾各五分天竺黃麝香各一字案古法用一字者以藥堆滿錢上之一字也用二字者同亦有隻用半字者上為末生蜜丸豆大每用半粒薄荷湯化下人參羌活散治傷風驚熱人參羌活川芎白茯苓柴胡前胡獨活桔梗枳殼地骨皮天麻等分甘草炙減半上用生薑薄荷水煎治驚熱加蟬蛻釣藤飲治天釣潮熱釣藤人參犀角屑各半兩全蠍天麻各二分甘草半分上為末每服一錢水煎消食丸治乳食過多胃氣不能消化砂仁陳皮神麯炒麥芽炒三稜蓬朮各半兩香附炒一兩上為末神麯糊丸麻子大量兒大小每服數分白湯送下柴芍參苓散治肝膽經分患天泡等瘡或熱毒瘰癧之類柴胡白芍人參白朮炒茯苓陳皮當歸各五分丹皮山梔炒甘草各三分上每服二錢水煎柴歸飲治痘瘡初起發熱未退無論是痘是邪疑似之間均宜用此平和養營之劑以為先著有毒者可托有邪者可散實者不致助邪虛者不致損氣凡陽明實熱邪盛者宜升麻葛根湯如無實邪則悉宜用此增減主之當歸二三錢白芍或生或炒一錢五分柴胡一錢或一錢半荊芥穗一錢甘草炙七分或一錢水一鍾半煎服或加生薑三片血熱者加生地陰虛者加熟地氣虛脈弱者加人參虛寒者加炮姜肉桂火盛者加黃芩熱渴者加乾葛腹痛者加木香砂仁嘔惡者加炮姜陳皮若治麻疹或以荊芥易乾葛陰寒盛而邪不能解者加麻黃桂枝辰砂六一散解煩熱止渴利小水粉甘草一兩桂府滑石飛六兩硃砂三錢上為極細末量兒大小每服一二三錢開水調下犀角地黃湯治勞心動火熱入血室吐血衄血發狂發黃及小兒瘡痘血熱等症生地四錢白芍丹皮犀角鎊各一錢五分如欲取汗退熱必用尖生磨攙入和服方妙上水一鍾半煎八分服或入桃仁去皮尖七粒同煎以治血症七福飲治氣血俱虛而心脾為甚者人參隨宜熟地隨宜當歸二三錢白朮炒一錢五分甘草炙一錢棗仁二錢遠志制三五分上水二鍾煎七分食遠溫服或加生薑三五片養心湯治心血虛怯驚癇或驚悸怔忡盜汗無寐發熱煩躁人參黃耆遠志當歸川芎棗仁五味子肉桂柏子仁白茯苓茯神半夏曲各三錢甘草炙四錢上每服二三錢薑棗水煎六氣煎治痘瘡氣虛癢𤹀倒陷寒戰咬牙並治男婦陽氣虛寒等症黃耆炙肉桂人參白朮炒當歸甘草炙上分量隨宜水煎加減照六物煎法詳見痘論六物煎下三柴胡飲凡素稟陰分不足或肝經血少而偶感風寒者或感邪不深可兼補而散者或病後產後感冒有不得不從解散而血氣虛弱不能外達者宜此主之柴胡二三錢白芍一錢半甘草炙一錢陳皮一錢生薑三五片當歸二錢上水一鍾半煎七分溫服如微寒咳嘔者加半夏一二錢溏泄者以當歸易熟地參附湯治真陽不足上氣喘急呃逆自利臍腹疼痛手足厥冷嘔惡不食自汗盜汗氣短頭暈等症人參製附子須參倍於附或等分不拘五錢或一兩酌宜姜水煎服參歸湯治心虛血熱自汗盜汗一名團參散一名人參湯人參當歸等分上為末每服二錢用雄豬心一個切三片以一片煎湯調服人參建中湯治虛勞自汗甘草炙桂枝生薑各三兩大棗十二枚白芍六兩膠飴一升即麥芽糖人參二兩上水七升煮取三升去渣入膠飴更上微火消解溫服一升日三服此漢時分量權量與今時不同酌宜用之可也嘔家不可用建中湯以甜故也丹溪人參竹瀝之法丹溪云痙比癇為虛宜帶補多是氣虛有火兼痰用人參竹瀝治之不用兼風藥人參竹瀝上將人參煎湯入竹瀝和服五福飲凡五臟氣血虧損者此能兼治之足稱王道之最人參主心熟地主腎俱隨宜用當歸主肝二三錢白朮主肺炒一錢半甘草主脾炙一錢水二鍾煎七分溫服或加生薑三五片凡治氣血俱虛等證以此為主或宜溫者加姜附宜散者加升麻柴葛左右逢源無不可也大營煎治真陰精血虧損及婦人經遲血少腰膝筋骨疼痛或氣血虛寒心腹疼痛等症當歸二三錢或五錢熟地三五七錢枸杞二錢甘草炙一二錢杜仲二錢牛膝一錢五分肉桂一二錢水二鍾煎七分食遠溫服如寒滯在經氣血不能流通筋骨疼痛之甚者必加製附子一二錢方效如帶濁腹痛者加破故紙一錢炒用如氣虛者加人參白朮中氣虛寒嘔惡者加炒焦乾姜一二錢大補元煎治男婦氣血大壞精神失守危劇等症此迴天贊化救本培元第一要方人參補氣補陽以此為主少則用一二錢多則用一二兩熟地補精補陰以此為主少則用二三錢多則用二三兩山藥炒二錢杜仲二錢當歸二三錢若泄瀉者去之山萸一錢如畏酸吞酸者去之枸杞二三錢甘草炙一二錢水二鍾煎七分食遠溫服如元陽不足多寒者加附子肉桂炮姜之類隨宜用之如氣分偏虛者加黃耆白朮如胃口多滯者不必加如血滯者加川芎去山萸如滑泄者加五味破故紙之屬十全大補湯治氣血俱虛惡寒發熱自汗盜汗肢體困倦眩暈驚悸晡熱作渴遺精白濁二便見血小便短少便泄閉結喘咳下墜等症人參白朮炒茯苓甘草炙減半熟地黃當歸白芍藥減半川芎照芍藥更減一半黃耆炙肉桂錢許上水煎溫服雙金散治天釣目久不下蜈蚣一個去頭足尾用真酥塗抹慢火炙黃置砧子上面南立用竹刀子當脊縫中亭利作兩半個左邊者入一貼子內為左字右邊者亦入一貼子內為右字不得交錯錯即大誤矣慎之慎之麝香一錢細研先將左邊者同於乳缽內研作細末卻入在左字貼內收起別用乳缽將右邊字者入麝香同研極細卻入右字貼內收不得相犯每有病者眼睛釣上止見白睛兼角弓反張更不能出聲者用細葦筒子取左字貼內藥少許吹在左邊鼻里右亦如之用藥不可多若眼未全下更添些少以意量度其眼隨手便下即止逍遙散治肝脾血虛及鬱怒傷肝少血目暗發熱脅痛等症當歸白芍白朮炒茯苓甘草炙柴胡各等分上加煨姜薄荷少許水煎加味歸脾湯治脾經血虛發熱等症人參黃耆炙白朮炒茯苓棗仁各二錢遠志當歸各一錢木香甘草炙各五分柴胡山梔各一錢水二鍾加圓眼肉七枚煎七分溫服妙香散治心氣不足驚癇或精神恍惚虛煩少寐盜汗等症辰砂三錢麝香一錢木香煨二錢五分茯苓山藥茯神遠志黃耆炙各一兩桔梗甘草人參各五錢上為極細末每服一錢溫酒或白湯調服補肺散治肺虛噁心喘急久患咳嗽有痰阿膠一兩五錢炒鼠黏子炒馬兜鈴各五錢杏仁七粒糯米一兩甘草三錢上每服二三錢水煎紫河車丸治癲癇紫河車肥大者一具人參當歸二味酌用為末上將河車生研爛入二藥加糯米粥少許搗丸桐子大每服五七十丸日進三服人乳化下凡先天不足後天虧敗者俱可隨宜增用藥物照此制服無不可也或將河車用酒頓熟亦佳消風丸治風癇先宜此藥膽星二錢羌活獨活防風天麻人參荊芥川芎細辛各一錢上為末蜜丸桐子大每服二丸薄荷紫蘇湯調化下秘旨安神丸方見熱論導赤散方見實論四君子湯方見熱論五味異功散方見熱論六君子湯方見寒論附子理陰煎方見寒論六味回陽飲方見寒論胃關煎方見寒論異功散即五味異功散方見熱論地黃丸方見熱論瀉青丸方見實論益黃散方見寒論惺惺散方見表論四柴胡飲方見實論柴胡清肝散方見熱論補中益氣湯方見虛論八珍湯方見虛論不可餓論第十內經云人之所受氣者谷也谷之所注者胃也胃者水穀氣血之海也又曰人以水穀為本故人絕水穀則死又曰人受氣於谷谷入於胃以傳於肺五臟六腑皆以受氣又曰真氣者所受於天與穀氣並而充身也又曰谷不入半日則氣衰一日則氣少矣又曰營氣之道納穀為實又曰脾者倉廩之官胃者水穀之海六腑之大源也又曰五臟皆稟氣於胃胃者五臟之本也又曰有胃氣則生無胃氣則死李士材曰嬰兒既生一日不再食則飢七日不食則腸胃涸絕而死經云安穀則昌絕谷則亡猶兵家之餉道也餉道一絕萬眾立散胃氣一敗百藥難施一有此身必資穀氣願飲食之於人不綦重歟豈知近日醫流毋論大人小兒凡遇發熱不分表裡虛實便一概禁絕其飲食而惟揚屬為尤甚至有餓不死傷寒之說愚夫愚婦習焉不察至死不悟嗟乎胃氣者元氣也飲食者人之所賴以生者也人非飲食何以生乎且夫風寒外感未曾傳裡之時其邪在表里本無病其人自能食若表不解邪傳入里其人自不能食方其在表能食之時醫者妄絕其飲食是先絕其胃氣也胃氣一傷則諸臟無所稟氣而皆傷矣諸臟之氣皆傷則正不勝邪正不勝邪則無以捍禦外侮勢必邪氣乘虛內陷而直入堂奧矣若曰風寒宜餓試問仲景先生傷寒論第一條風傷衛服桂枝湯後令人歠熱稀粥一升余以助藥力穀氣內充則邪不能入且俾胃中陽氣鼓動邪自作汗而解者為何說也況汗生於陰非飲食無以生陰長陽所宜禁者生冷黏滑肉面五辛酒酪臭惡等物耳此或因從前病家不耐甘淡仍食黏滑肉面之物醫者不免有勿多食之戒愚者聞之錯會其說遂至承認襲謬貽害至今殺人無已在大人或可自知飢甚難支猶可追呼索食在小兒則口不能言任人布置勢必輕病變重輾轉呻吟不至餓死不止傷心慘目莫此為甚間有愈者亦必羸弱不堪致使壯者怯而弱者夭孫真人云小兒有病宜單乳不哺足可證今人清餓之謬歷覽名家所著之書亦從未有餓之一字蓋人之既長全資穀氣以為生嬰孺之時必賴乳飲以為命吾今與醫家病家約凡於外感之症毋論大人小兒若其能食者不必禁其食不能食者當思所以食之要之能食之病其病必不死雖弗藥可也不能食之病除傷食惡食外醫者務求其所以而治之俾其能食則其病亦自愈有志於生命者慎毋以習俗相沿亦蹈餓人之弊也吾特於此諄諄而詳戒之治痘論第十一痘瘡一證由先天伏毒觸後天時行之氣而後發在上古民物貞淳並無所謂痘瘡之說至於後世乃至人人不免為嬰兒生死一大關頭雖曰天地之氣運使然要亦人事之不古耳其候有三曰順險逆辨之有四曰寒熱虛實蓋順症可不必治自愈逆症難治難愈所宜治者惟險症而已所謂險症者或由天時不正或因稟賦素虛或兼外感或挾內傷或將護失宜或服藥謬妄率皆人事之不齊非痘瘡之自為險逆也嘗見近日幼科動稱火毒大黃石膏之屬率意輕投致使脾腎生氣大傷勢必毒氣乘虛內陷冤乎冤乎此非醫為之乎且夫痘瘡見點之後毒氣悉已發越在表最忌攻裡前人戒妄汗妄下已不勝諄切詳盡何後人之懵懵也主治之法辨列於後宜詳觀之然欲無險逆而求萬全莫如種痘附種痘說表虛見證主治之法表虛之狀初發熱時其熱必微或惡寒身振振搖動如瘧之狀宜柴葛桂枝湯加黃耆主之或寒熱往來四肢厥冷面色青白或多汗惡風或怠惰嗜臥脈必浮細而弱宜溫中益氣湯參耆內托散或十宣散之類主之若初見點便作癢者宜六氣煎加川芎白芷防風荊芥或十宣散之類主之若表虛不能約束毒氣以致一齊湧出顆粒細碎者實表解毒湯主之若表虛無力托送以致痘出不快者實表解毒湯十宣散保元湯之類主之若已見齊而痘色灰白頂陷或伏陷或不起發不光澤或色嫩皮薄或癢𤹀或如水泡或摸不礙手或根窠不紅或倒靨或不能結痂者脈必細數無力悉是表虛之候宜保元湯十全大補湯六氣煎之類主之若已成漿不因吐瀉而忽見寒戰者表虛甚也養衛化毒湯主之表實見證主治之法表實之狀初熱之時壯熱無汗惡寒頭疼身痛脈浮緊數如在冬月寒勝之時宜人參敗毒散主之如時令暄熱宜升麻葛根湯主之如不寒不熱天氣溫和之時宜柴歸飲主之然此皆為表實者宜之設或稟賦素虛或表邪不甚或肢體潮潤或已見點雖升麻葛根湯亦不宜用矧敗毒散乎倘誤表之必致潰爛之變其次若面赤唇紫眼紅鼻塞皮焦膚赤手足熱甚者宜搜毒煎或加柴胡或柴歸飲主之若已見點而痘色紅紫焮腫疼痛或皮厚而硬或癰腫癍疔脈見浮洪滑實裡氣亦實者四味消毒飲鼠黏子湯之類主之若已見點而身熱不退者宜滋營氣芎歸湯主之不得肆用表散蓋妄汗能致癍爛也慎之慎之若已見點而偶為風寒所感痘出不快身熱加增者此又宜微表之也柴歸飲主之表寒見證主治之法表寒之狀不起發不紅活根窠淡白宜保元湯六物煎參耆內托散之類少加酒同煎主之若已起發而身涼癢𤹀倒陷乾枯者宜保元湯六氣煎十全大補湯之類作大劑亦少加酒煎主之不應者加鹿茸附子表熱見證主治之法表熱之狀肌膚大熱氣粗喘滿煩躁狂言宜羌活散郁湯柴歸飲之類主之若身外熱甚而唇潤不渴目無赤脈大小便調身雖大熱但熇熇然柴歸飲主之若已出而根窠紅紫宜四物湯涼血養營煎之類主之若已見點而頂赤發癍涼血養營煎犀角散之類主之若頭面紅腫紫黑焦枯紫草快癍湯涼血養營煎六味地黃湯之類主之若夾癍夾疹眼紅唇裂涼血養營煎主之裡虛見證主治之法裡虛之狀或因先病吐瀉或因誤服寒涼之劑或痘瘡已出未出之間而為吐瀉嘔惡精神倦怠喜熱飲食者宜六君子湯五君子煎理中湯參姜飲之類主之若少食或不思食或食亦不化此脾胃之氣虛也宜五味異功散四君子湯之類主之若二便清利或溏泄不渴或氣促聲微或神昏多睡或腹膨噯氣吞酸脈見弱而無力者宜人參理中湯保元湯六氣煎之類主之若痘未出發熱之初而見吐瀉一二次即止者其痘出必輕不必治之此又不可不知也要之痘瘡全賴裡氣完固若裡氣虛損則生機息矣喜用石膏大黃者吾誠不知其為何心也裡實見證主治之法裡實之狀二便秘結胸膈脹滿作渴喜冷或唇燥咽乾口瘡舌黑脈見沉數有力痘形未見之時宜微下之四順清涼飲當歸丸之類少少與之若肢體熱甚柴胡飲子若煩躁驚狂聲高譫語脈見洪滑者辰砂六一散退火丹導赤散之類主之若痘已隱隱見於皮膚之間此痘已發越在表若里症果急宜微通其二便斷不可過用攻裡之劑也若妄下之必致裡虛而變內陷矣慎之慎之要之近日屬實之症不多若妄用之則大誤矣且痘瘡最喜裡氣完實自必能食雖兼他症以末治之可也裡寒見證主治之法裡寒之狀大小便利面青目白或因臟腑素虛或因誤服涼藥而見瘡白神倦吐瀉嘔惡氣促肢冷或腹脹腹痛以致痘出不快或已出而陷伏倒靨者宜六氣煎九味異功煎十二味異功散之類主之若已見齊或行漿之際為涼藥所誤以致吐瀉寒戰咬牙者木香散十二味異功散之類主之然此二方溫則有餘補則不足不若用九味異功煎為最妙若因誤食生冷而致腹脹腹痛或吐瀉者理中湯加肉桂木香或四君子加乾薑木香之類主之若胃氣虛寒腹痛喜按者黃耆建中湯主之若脾腎虛寒小腹作痛瀉利不止者胃關煎主之大抵裡寒之症必由誤服寒涼攻伐之劑所致奈何近日幼科胸中毫無的確明見粗淺浮躁肆用寒涼致令小兒陽氣受傷裡虛變逆死者多矣深堪哀憫有人心者其亦知所以自省矣裡熱見證主治之法裡熱之狀煩躁狂言口乾大渴內熱自汗小便赤澀大便秘結脈見沉數有力宜退火丹四順清涼飲之類主之若衄血元參地黃湯加陳墨汁主之溺血大分清飲主之若已出未出之際衄血或溺血者並宜犀角地黃湯主之血止後即宜用調元湯主之或少加木通若初見發熱便覺大渴唇焦舌燥者宜葛根解毒湯主之若火迫庚金而協熱作瀉者必其脈見洪數身有大熱口有大渴喜冷惡熱煩躁多汗中滿氣粗痘色焮腫紅紫口鼻熱赤小水澀痛稟賦素實者宜黃芩湯主之然此症不多斷不可以此湯誤治虛寒泄瀉也慎之慎之又或已未見點之時咽腫喉痛者甘桔湯加牛蒡主之若已見齊起脹灌漿之時而見喉痛者此因喉內有痘作痛收靨時自愈不必治之若痘已出齊而脾肺有熱作渴喜冷者宜人參麥門冬散主之若痘出而夾癍夾疹煩躁大渴妄言妄見雙解散主之以上皆當與各條參看果屬裡熱始無貽誤倘稍涉疑似則害人不淺矣慎之慎之順逆身無大熱痘腳稀疏根窠紅綻不瀉不渴乳食不減四肢溫和聲音清亮精神如常脈象和緩此屬順症不須服藥自愈至若逆症咳嗽聲啞飲食挫喉一惡也腹脹氣促悶亂不寧二惡也渴瀉不止咬牙寒戰三惡也瘡嫩易破癢𤹀不止四惡也紫黑灰色頂陷喘渴五惡也若按上法急為救療十中尚可全活八九慎勿以其惡遂棄而不治也此外尚有輕變為重所犯者七一不忌口味生冷滑膩致令脾胃受傷二先曾泄瀉裡虛不能托毒外出三過服表藥或不避風寒致損表氣四餌涼藥及妄用攻裡之劑致令裡氣虛寒毒氣不能發出五穢氣所觸詳見種痘說內蓋血氣聞香則順聞臭則逆順則易出易靨逆則難愈六生人輒至及僧尼孝服七犯房屋又重變為輕返凶為吉所慎者五一謹避風寒二身常和暖寒則添衣熱則減去務得中和毋令太過不及三節飲食大忌西瓜柿橘菱角水蜜等冷物恐內傷胃氣及肥肉油膩滑腸作瀉酸鹹作渴酒蔥蒜魚羊腥物作癢務使脾胃充實則痘瘡易出易靨也四大便稠飲食調和不致泄瀉一日二日一次為調日行二三次為利宜急用甘溫補脾藥若值灌漿之時雖三四日不行不得誤以為秘五按法調理補氣血顧脾胃避風寒節飲食毋妄汗毋妄下斯皆可以轉重就輕返逆為順庶幾不致變輕為重矣戒妄汗妄下人之一身本乎氣血氣為衛血為榮氣陽而血陰也陽主動所以沖暢隧道運動樞機者也陰主靜所以棄溢臟腑灌溉周身者也然其所重則又在乎脾胃是故脾胃者五臟六腑生化之大源也經云人之所受氣者谷也谷之所注者胃也胃者水穀氣血之海也至於痘瘡則全資氣血但得氣血充暢則易出易收氣血不足則變症百出故始出之際賴氣血以載毒外出繼則因氣血以起脹灌漿終之以結靨落痂莫非氣血為之運化倘氣血稍虛脾胃一損則生機息而化源絕矣奈何宋麟祥之痘疹正宗誤用寒涼攻伐致令愚盲幼科避諸大家之煩貪痘疹正宗歸宗湯一方之易遂至一時翕然用之不分虛實寒熱妄行攻下以致陰陽脾胃之氣俱傷變症因之蜂起因而死者多矣蓋妄汗傷陽則凡起發灌漿收靨之力皆失所賴勢必變為癍爛音啞皮薄癢𤹀外剝而死故前人於痘瘡見點之後便禁用升麻葛根湯恐發得表虛也妄下傷陰則凡臟腑化源精神鎖鑰飲食倉廩皆為所敗是必變為陷伏不起發不灌漿灰白倒靨手足逆冷吐利不食寒戰咬牙腹痛虛脹內攻而死故前人禁用大黃石膏枳殼生地鼠黏紫草芩連梔子之屬恐攻得裡虛也故錢氏曰瘡疹惟用溫平藥治之不可妄下及妄攻伐良有以也陳氏云痘以太陰脾肺二經為主肺宜溫而脾宜燥萬氏云痘瘡始終以脾胃為主胃嘗養而脾當補馬氏云痘以少陰心經為主火不可太清血不可太涼三說皆是也蓋脾為孤臟能灌四旁則四臟皆賴一臟以養之況脾屬土而主肌肉若能化水穀成津液灌溉諸經令肌肉不枯氣血得其助痘何難成但寒土不能生物必有陽氣熏蒸於下而後能成發育也如草木之根在土而冬月何以不生以真陽之氣息也可見脾受水穀化生津液必藉火氣始能成腐化之功所謂火能生土火乃土之母也心為君火能役相火主乎血脈若心火不息血不寒凝自能與脾之津液相為流通痘自紅潤而鮮豔所謂血主濡之氣主呴之氣無血不走血無氣不行氣乃血之帥也氣行血亦行肺統一身之氣主乎皮毛若肺氣充盈自能與心之血脈相為周運痘自尖圓而肥潤是血氣充資足交會於前脾生津液助養於後痘之成功三臟缺一不可若肝臟則無與焉至於腎臟如攻伐太過或經泄瀉腎氣損傷則痘瘡變黑歸腎而死矣薛氏曰凡痘瘡在四五日之間死者毒氣盛真氣虛而不能起發也六七日之間死者元氣虛而不能灌膿也旬日之外死者邪氣去脾胃敗而元氣內脫也治者但能決其死而不知其死必本於氣血虧損苟能逆推其因而豫為調補豈斷無生理哉蓋起發灌膿結痂三者皆由脾胃榮養不可妄投表下攻伐之劑庶不誤人於夭札也業幼科者可不戒哉請更言之試問痘疹正宗專以歸宗湯一方肆用寒涼攻伐欲以應無窮之痘有是理乎不待明智之士自能覺其非矣何幼科昧心喪良故蹈其轍也有力仁人若能火其書毀其板使邪說息而正道行則於嬰兒造福不淺矣痘後痘瘡收靨落痂之後其嬰兒氣血必虛蓋自初熱傷陰以至出齊起發灌漿結靨落痂莫非氣血之所為且或體虛痘密遍體不留余隙果能一一沖托成實則是周身氣血皆為痘用周身氣血皆為痘用則未有不耗傷者氣血既皆為痘耗傷則凡於落痂之後必宜加意培補縱有他症皆當以末治之務令氣血得以充足復原不致遺後日多疾之患譬如以人搏虎虎雖斃而人之氣力傷矣人之氣力既傷未有不需飲食酒肉以將息者奈何近日俗習不知此理每於痘瘡皆喜進清涼之劑於落痂之後亦妄用黃連梔子苦寒之屬謬曰敗毒致使脾胃生氣大傷飲食減少尩羸孱弱卒難復原或即變生他症仍歸夭亡可勝浩嘆嗟乎痘不成漿由氣血不能運化痘既成漿毒氣已解果使漿稠痂厚則毒氣全解痂落之後尚何餘毒之可清在稟賦壯實血熱瘢紫者或堪其謬若瘢色紅淡或雪白者服之必死婦人無知庸醫謬習沉迷痼結禍世已深僕思挽救是以不惜諄復其詞用以代鐸以振世之聾聵云附種痘說粵稽上古之世民物貞淳人心恬淡並無所謂痘瘡一症者迨至有唐以後風俗澆漓人情穿鑿淫泆嗜好醇酒膏粱六淫外干七情內擾臟腑鬱蒸氣精滓濁及至分形受質兩情相感一氣渾融錯雜之邪交相施瀉胚胎之始毒即伏焉既生之後必待天地時行疫癘之氣或挾外感內傷之邪觸之斯發乃至遁為傳染比戶皆然為嬰兒所必不能免此父母遺毒之為害也如此加以近日醫無善術用藥乖離遂至險逆相尋死亡略半此庸醫之為害也又如此嗟乎父母愛子之心何所不至劬勞鞠育惟疾之憂一旦為庸醫所誤呼救何從甚且宗祀攸關賴此一線抑或貞嫠忘死守此藐孤一遇差遲含冤更慘真令人言之痛心聞之墮淚者也幸至有宋有神人出而立種痘一法乘兒無病之時而種之其種出之痘少者不過數粒多者不過數十粒而已且不需服藥誠挽回造化避危就安萬舉萬全之良法也本朝高宗純皇帝仁被萬方德逾千古憫茲良法方書未載恐日久湮沒失傳特於御纂醫宗金鑑書內編輯種痘心法要旨仰見仁慈恩深保赤者矣第邇來能種之子皆有力之家單寒之兒猶然自出豈不大負國家及在昔神人之初念乎原其所以屈於力有所不能耳今喜博愛堂諸君子發心擇請種師並資助衣食廣為貧家兒女種痘洵慈幼之盛舉也予甚樂焉用是特綴數語並冀廣為勸導使人人皆能效法諸君子於以修福而廣皇仁端在是矣功德豈有量哉一種痘原所以去險履平避危就安而設務宜用種出之痘所落之痂作苗其氣純正無天行時毒外感內傷之邪夾雜於中種出自然稀疏順吉應時成功決無愆忒若夫時痂則斷不可用至於種法宜以水苗為上一下苗之後調攝禁忌不可不慎自始至終不可稍忽如避寒熱慎飲食是也假令天氣嚴寒蓋覆宜溫暖勿使受寒恐被寒氣所觸則痘不得出亦不可過於重棉疊褥火器熏靠衣被致熱氣壅滯使痘不得宣發天氣和暖蓋覆宜適中恐客熱與毒相併致增煩熱亦不可輕易著單露體致風寒外侵阻遏生髮之氣此寒熱所以貴得其平也臥處常要無風夜靜不斷燈火不離親人看守一切食飲宜豫為現成以備不時之需如時有迅雷烈風之變宜謹帷帳添蓋覆多燒闢穢香以闢一時不正之氣至於飲食人之氣血藉以生化痘之始終全賴乎此若飲食虧少氣血何所資助乎但不可過甚若過飲則飲停不化津液過食則食滯壅遏氣機大凡吮乳之兒不多乳不闕乳能食之兒勿餐生冷黏硬勿啖辛熱炙爆勿恣意茶水勿飲涼漿食不過飽亦不令飢此飲食所以貴得其平也寒熱飲食而外則凡舉止動作既不可任意驕縱亦不可過於拂逆惟在調攝之人耐其性情兢兢業業善為保護不但慎於既種之後且當慎於未種之先不但慎於見苗之初猶當慎於落痂之後種師宜諄諄告誡務期詳細使彼知關係匪輕心存謹慎如法調攝可保萬全至於禁忌亦最緊要凡種痘之家房中最要潔淨切忌衝犯宜明亮不宜幽暗勿詈罵呼怒勿言語驚慌勿對梳頭勿對搔癢勿嗜酒勿歌唱凡房中淫泆氣婦人經候氣腋下狐臭氣行遠勞汗氣誤燒頭髮氣誤燒魚骨氣吹滅燈燭氣硫黃蚊煙柴煙氣煎炒炙爆氣蔥蒜醉酒氣溝渠汙濁氣黴爛蒸濕氣溷圊廁桶氣病人穢惡氣新喪殗穢氣以上務宜謹慎遵守毋稍懈忽倘自不經心致令觸犯咎難他諉也仍宜謹伺房門勿令生人及僧尼孝服人輒入宜將此刷印人給一張俾各自慎闢穢香方蒼朮大黃減半上二味共為細末紅棗煮湯連肉和成條曬乾宜豫制給人一凡房屋寬深者自宜聽其在家謹慎將護倘室廬狹隘或不足以蔽風雨者果能籌屋以備暫居則更妙矣並且隨時酌借帳被每一小兒宜給紅興布扎頭一條紅稀布小褂一件取其新潔而又和軟也若極貧之兒於冬令嚴寒之時則當改給絮襖矣此宜隨時斟酌在於發熱之時與之以杜冒濫既見點後給燈油魚饅錢三百六十文倘不守禁忌將護失宜致生他症設有不測者亦宜量給小費此雖萬中之一然不得不豫為之籌也一歲之內四時宜否要在活人非富貴之家自種可比但於五六七月間藉以深邃房屋少少種之以為接苗之計其餘各月不妨隨到隨種多多益善也下苗日期宜避破閉及四立二分二至之前一日並年命刑衝破害及歲煞災煞劫煞天剋地衝比沖之日凡驗看小兒以耳後筋紋為主紅而紋少者為上紋多而色不紫赤者次之若紋多而色兼青紫此雖不可與種然聽其自出則更難矣宜贈以稀痘藥數服後令其再詣師驗看若轉為紅色則又宜亟為之種矣此外如病後或現有病或未及周歲皆當緩種必俟其氣血和平始與之種除此以往無不可種之兒也稀痘藥方附後消毒救苦湯羌活防風連翹生地酒黃柏升麻麻黃根各五分川芎藁本柴胡葛根生黃芩酒黃芩蒼朮各二分細辛生甘草白朮陳皮紅花蘇木各一分當歸身黃連各三分吳茱萸半分共為粗末周歲之兒每用三錢兩三歲者用五錢於四立前一日東流水煎調製硃砂服制硃砂法用當歸川芎升麻甘草各六兩東流水六大碗新砂鍋桑柴文火煎減半傾出濾去渣用好硃砂四兩絹包線扎懸胎離砂鍋底寸許掛定將前所濾之湯陸續入於鍋內桑柴火緩煮俟湯將干取起研極細末一歲一分下苗後必以七日五臟傳遍而後發熱為則然亦有六日而即熱者亦有九日十一日而始熱者此其常也若發熱於五日以前此際苗氣尚未傳遍熱何由作必因將護不慎致犯外感內傷或已染時行之氣而欲出天花也與種痘無涉種師宜豫申明其說焉若逾十一日不熱宜更為補種附方柴葛桂枝湯主表散痘熱柴胡乾葛桂枝防風白芍甘草人參水一盞加生薑三片煎七分溫服表虛加黃耆溫中益氣湯氣血雙補疏通隧道並達四肢人參白朮炒各五分生黃耆八分歸身白茯苓各六分甘草炙川芎各四分白芷防風各四分木香官桂去粗皮各二分山楂肉六分生薑一片棗一枚去核水一大鐘煎四分溫服參耆內托散痘虛發癢或不化膿或為倒靨人參黃耆蜜炙當歸川芎厚朴薑製防風桔梗炒白芷紫草官桂去粗皮木香甘草各等分糯米一撮水煎色淡白者去防風紫草白芷宜多加糯米一方有芍藥十宣散調氣補血內托瘡毒五日後必用之方也亦治癰疽人參黃耆當歸各二錢川芎防風桔梗白芷炙草厚朴各一錢桂心三分上為細末每服一錢或二錢木香湯調下實表解毒湯人參黃耆當歸生地甘草白芍柴胡升麻片芩酒炒元參地骨皮上入薄荷葉少許淡竹葉十片水煎保元湯治痘瘡氣虛𤹀陷者人參二三錢甘草炙一錢肉桂五七分黃耆二三錢灌膿時酒炒回漿時蜜炙水一鍾半加糯米一撮煎服此藥煎熟加人乳好酒各半盞和服更妙酌宜用之頭額不起加川芎三五分面上加升麻三四分胸腹加桔梗三四分腰膝加牛膝四分四肢不起加桂枝二三分嘔惡加丁香三四分元氣虛寒加大附子制七八分或一錢養衛化毒湯人參黃耆炙桂枝甘草當歸上水煎服人參敗毒散治時疫癍疹人參茯苓枳殼甘草川芎羌活獨活前胡柴胡桔梗各等分水一鍾半姜三片煎服升麻葛根湯解發痘毒升麻葛根白芍甘草各等分水一鍾煎七分溫服搜毒煎解痘疹熱毒熾盛紫黑乾枯煩熱便結純陽等症紫草地骨皮牛蒡子研黃芩木通連翹蟬蛻芍藥各等分水一鍾半煎服表熱者加柴胡四味消毒飲治痘瘡熱盛毒氣壅遏無問前後皆可服人參甘草炙黃連牛蒡子各等分上為粗末每服一錢加姜一片水一盞煎四分去滓溫服不拘時鼠黏子湯治痘稠身熱毒盛服此以防青乾黑陷並治癍疹稠密牛蒡子炒研歸身黃耆甘草炙柴胡黃芩酒炒連翹地骨皮水煎服熱退則止芎歸湯養營起痘當歸川芎減半上為細末每服一錢紅花湯調服六物煎治痘疹血氣不充隨症加減用之神效不可盡述甘草炙當歸熟地或用生地川芎三四分不宜多白芍俱隨宜加減人參或有或無隨虛實用之氣不虛者不必用水煎服如發熱不解或痘未出之先宜加柴胡以疏表或加防風佐之如見點後痘不起發或起而不灌或灌而漿薄均宜單用此湯或加糯米人乳好酒肉桂以助營氣如氣虛癢𤹀不起加川山甲炒用如紅紫血熱不起宜加紫草或犀角如脾氣稍滯宜加陳皮山楂如胃氣虛寒多嘔者加乾薑炒用或加丁香如腹痛兼滯者加木香陳皮表虛氣陷不起或多汗者加黃耆氣血俱虛未起未灌而先癢者加肉桂白芷如元氣大虛寒戰咬牙泄瀉宜去芍藥加黃耆大附子乾薑肉桂羌活散郁湯治實熱壅盛郁遏不得達表氣粗喘滿腹脹煩躁狂言譫語睡臥不寧大小便秘毛豎面浮眼張若怒並有神效併為風寒外搏出不快者同治防風羌活白芷荊芥桔梗地骨皮川芎連翹甘草紫草大腹皮鼠黏子上為粗末水一鍾燈心十四根煎六分溫服涼血養營煎治痘瘡血虛血熱地紅熱渴或色燥不起及便結溺赤凡陽盛陰虛等症悉宜用此生地當歸白芍生甘草地骨皮紫草黃芩紅花水一鍾半煎服量兒大小加減用之渴加天花粉肌熱無汗加柴胡熱毒盛者加牛蒡子木通連翹之屬血熱毒不透者加犀角犀角散治痘瘡癰毒時毒熱盛煩躁多渴小便赤澀或赤癍犀角鎊甘草炙各五分防風黃芩各一錢上為粗末每服二錢水一小盞煎五分溫服無時紫草快癍湯治痘疹血氣不足或血熱不能起發灌膿色不紅活紫草人參白朮炒當歸川芎白芍茯苓甘草木通等分上加糯米每服三五錢水煎參姜飲治脾肺胃氣虛寒嘔吐咳嗽氣短小兒吐乳等症人參三五錢或倍之甘草炙三五分乾薑炮五分或一二錢或用煨生薑三五片水一鍾半煎七八分徐徐服之當歸丸治便堅三五日不通裡氣實而稟賦強者當歸五錢紫草三錢黃連一錢五分炒甘草炙一錢大黃二錢五分上以當歸紫草熬成膏下三味研為細末以膏和為丸如胡椒大三歲以下兒服十丸七八歲兒二十丸食前清米飲下漸加之以和為度退火丹治痘中狂妄神方滑石硃砂飛各一錢冰片三釐共為細末冷水調一分服得睡少時神安氣寧痘轉紅活矣九味異功煎治痘瘡寒戰咬牙倒陷嘔吐泄瀉腹痛虛寒等症用代陣氏十二味異功散等方人參二三錢黃耆炙一二錢附子制一二錢熟地二三錢甘草炙七分或一錢當歸二三錢肉桂一錢乾薑炮一二錢丁香三五分或一錢上量兒大小加減用水一鍾半煎七分徐徐與服泄瀉腹痛可再加肉豆蔻麵炒一錢或白朮一二錢十二味異功散治元氣虛寒痘瘡色白寒戰咬牙泄瀉喘嗽等症人參丁香木香肉豆蔻陳皮厚朴各二錢五分白朮炒茯苓官桂去粗皮各二錢當歸三錢五分半夏制附子制各一錢五分上為粗末每服二三錢薑棗水煎去渣服木香散治痘瘡虛寒多滯者木香丁香大腹皮人參桂心甘草炙半夏制訶黎勒赤茯苓青皮前胡各等分上為粗末每服二三錢姜水煎去渣服薛立齋先生曰前方治痘瘡已出未愈之間其瘡不光澤不起發不紅活五七日內泄瀉作渴或肚腹作脹氣促作喘或身雖熱而腹脹足指冷或驚悸或汗出或寒戰咬牙或欲靨不靨瘡不結痂或靨後腹脹泄瀉作渴此皆脾胃虛寒津液衰少急用此藥治之若誤認為實熱用寒涼之劑及飲蜜水生冷瓜果之類必不救張景岳先生云以上二方溫性有餘補性不足用治寒症則可用治虛症則不及也黃耆建中湯治諸虛羸瘠百病甘草炙桂枝生薑等分白芍倍用大棗膠飴即麥芽糖黃耆炙上水煎減半去渣入膠飴更上微火消解溫服元參地黃湯治痘疹衄血元參生地黃丹皮梔子仁甘草升麻各五分白芍一錢蒲黃炒五分水一鍾煎七分溫服本方宜減去升麻惡其上升也加陳墨汁和服黑色象水能制火也大分清飲治積熱閉結小水不利或溺血蓄血腹痛淋閉等症茯苓澤瀉木通豬苓梔子枳殼車前子水一鍾半煎八分食遠溫服如內熱甚者加黃芩黃柏龍膽草之屬如大便堅硬脹滿者加大黃調元湯人參黃耆炙甘草炙上水煎服按此即保元湯無肉桂者名為調元湯即東垣先生之黃耆湯也東垣用為小兒治驚之劑魏桂嚴用以治痘多效因美之名調元湯也蓋小兒元氣未充最易傷殘用此保全誠幼科王道之妙方但能因此擴充則凡氣分血分虛寒虛陷等症皆可隨症增減無不可奏神效也葛根解毒湯治痘毒止渴良方葛根升麻減半生地麥冬天花粉等分甘草減半上取糯米泔水一盞煎七分入茅根自然汁一杯服之黃芩湯治太陽與少陽合病自下發汗黃芩甘草炙白芍大棗上水煎溫服若嘔者加半夏生薑按此方系治泄瀉第此症不多不可以此方誤治虛寒泄瀉也宜詳前熱論甘桔湯治一切風熱上壅咽喉腫痛甘草二錢桔梗一錢水煎食後服喉中有痘初見點時痛甚者加牛蒡子人參麥門冬散治痘瘡微渴麥門冬一錢人參甘草炙白朮炒陳皮厚朴薑製各五分水煎溫服量兒增減薛氏曰此方治痘瘡熱毒氣虛宜用之若因氣虛作渴宜人參白朮散雙解散治痘疹表裡俱實者防風川芎當歸連翹白芍薄荷大黃各五分石膏桔梗黃芩各八分荊芥穗白朮炒桂枝各二分滑石二錢四分甘草二錢水二鍾加生薑三片煎一鍾溫服無時六氣煎方見辨驚風之誤論十全大補湯方見辨驚風之誤論柴歸飲方見辨驚風之誤論四物湯方見虛論六味地黃湯即地黃丸作煎劑方見熱論六君子湯方見寒論五君子湯方見寒論理中湯方見寒論五味異功散方見熱論四君子湯方見熱論人參理中湯即理中湯人參分量加重用方見寒論四順清涼飲方見里論柴胡飲子方見實論辰砂六一散方見辨驚風之誤論導赤散方見實論胃關煎方見寒論犀角地黃湯方見辨驚風之誤論治疹論第十二疹天行時毒之氣也亦稟受胎毒之氣也出於痘前者名奶疹子出於痘後者名正疹子要亦生人必不能免之數也初發熱時咳嗽噴嚏鼻流清涕面浮腮赤兩目胞腫眼淚汪汪有如醉狀或嘔惡或泄利或手掏眉目鼻面是即出疹之候也然必發熱五七日或多至十一二日始見疹子者宜徐徐升托表邪俾疹毒出盡則兒無事矣切忌妄汗妄下若妄汗則增其熱為鼻衄為咳血為口瘡咽痛為目赤痛為煩躁為大小便不通妄下則虛其里為滑泄為下痢赤白為隱伏為喘逆多至不救慎之慎之主治之法輕者宜升麻葛根湯透邪煎柴歸飲之類主之重者宜金沸草散主之兼泄利者合升麻葛根湯去葛根加白芷主之若發熱至六七日明是疹子卻不見出此皮膚堅厚腠理閉密又或為風寒外襲或會有吐利乃伏也宜急用麻黃湯調檉葉散發之外用胡荽酒麻蘸戛之如一向未更衣者此毒甚於里也以七物升麻丸解之若咳嗽不止上氣喘急面浮目胞腫者宜甘桔湯消毒散瀉白散三方合用若更兼熱盛煩渴加石膏知母黃芩天花粉之類主之若自汗出或鼻衄者不須止之但不可太過如汗太多人參白虎湯或黃連湯之類主之若衄太多元參地黃湯或茅花湯之類主之若吐甚者黃芩湯加茅根蘆根枇杷葉主之若利甚者黃芩湯吞香連丸主之若咽候腫痛者甘桔湯加元參牛蒡連翹或射干鼠黏子湯之類主之既見疹後色貴通紅必以三日周身普遍而漸沒者為輕若色淡白者此心血不足也養血化癍湯主之若色太殷紅或微紫者此血分有熱也大青湯主之疹收之後清涕復來始為正候若疹既收後身有微熱不須施治若身熱太甚或日久不減者柴胡麥門冬散主之若發枯毛豎肉消骨立漸見羸瘦者柴胡四物湯主之若疹後發熱不除忽作搐者導赤散加人參麥門冬兼安神丸主之若疹後咳嗽者瀉白散合消毒散主之若咳甚氣喘甚至飲食湯水俱嗆出者門冬清肺湯加枇杷葉見血加茅根汁阿膠珠主之若疹後下痢赤白裡急後重日夜無度者黃芩湯兼香連丸主之虛者加人參滑者加椿根白皮俱於丸藥內加之大抵疹屬陽邪用藥最宜養陰然亦有屬虛寒者但當合色脈形證以治之始無貽誤若果熱甚氣粗渴而飲冷便秘溺澀脈象洪數有力悉宜按上法治之若神氣怠惰渴而飲湯二便調和脈象虛數即宜用歸芍養陰略加表托之品矧瀉痢氣喘尤多虛症乎斷不可泥為疹毒而不敢用補劑也慎之慎之附方透邪煎凡麻疹初熱未出之時惟恐誤藥故云未出之先不宜用藥然解利得宜則毒必易散而勢自輕減欲求妥當當先用此方為主當歸二三錢白芍酒炒一二錢防風七八分荊芥一錢甘草炙七分升麻三分水一鍾半煎服如熱甚脈洪滑者加柴胡一錢此外凡有雜症俱可隨宜加減加味金沸草散旋覆花去梗麻黃去節水煮去沫曬乾前胡去蘆各七錢荊芥穗一兩甘草炙半夏湯泡七次蘆汁拌炒赤芍各五錢鼠黏子炒浮萍各七錢上為末每服三錢生薑二片薄荷葉三五片煎麻黃湯麻黃去根節水煮去沫曬乾升麻牛蒡子炒蟬蛻洗淨去翅足甘草各一錢上加臘茶葉一錢為細末每服二三錢水一盞煎七分去渣服煩渴加石膏末四錢檉葉散檉亦名西河柳亦名垂絲柳青茂時採葉曬乾為末每服一二錢茅根煎湯調下胡荽酒闢穢氣使痘疹出快胡荽一把好酒二盞上煎一兩沸令乳母每含一兩口噴兒遍身或噴頭面房中須燒胡荽香以闢除穢氣能使痘疹出快煎過胡荽懸房門上更妙按此酒惟未出之前及初報之時宜用之若起脹之後則宜避酒氣亦忌發散皆不可用也七物升麻丸升麻犀角黃芩朴硝梔子仁大黃各二兩淡豉二升微炒上共為末蜜丸如黍米大凡覺四肢大熱大便秘者少服十餘粒取微利為止消毒散治痘瘡六七日間身壯熱不大便其脈緊盛者用此藥微利之荊芥穗甘草炙各一兩牛蒡子四兩並炒上共為粗散每用二三錢水一盞煎七分服人參白虎湯人參甘草各一錢知母三錢石膏五錢粳米一合上量兒大小水煎待米熟去渣溫服黃連湯黃連麥冬去心當歸黃柏黃芩生地黃耆上分量隨宜水煎去渣調敗蒲扇灰服之茅花湯茅花真鬱金生地黃梔子仁黃芩上水煎調百草霜服香連丸治熱瀉痢疾赤白膿血濕熱侵脾裡急後重黃連淨十兩切如豆大吳茱萸淨五兩上二味用熱水拌和一處入瓷罐內置熱湯中頓一日取起同炒至黃連紫黃色為度去茱萸不用每制淨黃連一兩加木香二錢五分共為細末醋糊丸桐子大每服一二十粒量大小增減空心米飲下射干鼠黏子湯治痘疹後癰疽瘡毒鼠黏子二錢升麻甘草射干各五分上銼散水一盞煎六分量大小服忌魚腥蔥蒜養血化癍湯當歸生地黃紅花蟬蛻人參各等分上銼細水一盞生薑一片煎六分去渣溫服無時大青湯大青元參生地黃石膏知母木通甘草地骨皮荊芥穗各等分上銼細水一盞淡竹葉十二片煎七分去渣量大小溫服柴胡麥門冬散柴胡五分龍膽草三分麥門冬八分甘草二分人參元參各五分上銼細水煎服柴胡四物湯柴胡人參當歸身黃芩川芎生地黃白芍地骨皮知母麥門冬淡竹葉上銼細水一盞煎七分去渣量大小溫服安神丸黃連當歸身麥門冬白茯神甘草各五錢硃砂一兩龍腦二分半上為極細末湯浸蒸餅和豶豬心血搗勻丸和黍米大每服十丸燈心湯下門冬清肺湯天門冬去心麥門冬去心知母貝母桔梗款冬花甘草牛蒡子杏仁去皮尖研馬兜鈴桑白皮地骨皮各等分上銼細水一盞煎七分去渣量大小食後溫服升麻葛根湯方見痘論柴歸飲方見辨驚風之誤論甘桔湯方見痘論瀉白散方見熱論元參地黃湯方見痘論黃芩湯方見痘論導赤散方見實論
